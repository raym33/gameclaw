interface:
  display_name: "Gameclaw"
  short_description: "Game references to commercial-looking playable slices"
  brand_color: "#F3BF63"
  default_prompt: "Use $gameclaw to turn my sketches, sprites, notes, and mechanics into a commercial-looking playable browser vertical slice. Choose the right runtime profile, game type kit, genre playbook, and runtime scaffold; if the ask is educational or gamified, load the education template; if it is a practical task sim with one character doing chores or procedures, load the task-sim template; if it is platformer-first, load the platformer template; if it is falling-block-puzzle-first, load the falling-block template and stay honest about runtime limits; if it is fixed-shooter-first, load the fixed-shooter template and stay honest about formation-runtime limits; then generate and integrate every missing asset family and push movement, physics, visuals, and screen presentation to app-store quality."

policy:
  allow_implicit_invocation: true
